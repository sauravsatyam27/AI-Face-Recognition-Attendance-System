version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: attendance-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: face-recognition
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: attendance-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/face-recognition?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      AI_SERVICE_URL: http://ai-service:5001
      NODE_ENV: production
    depends_on:
      - mongodb
      - ai-service
    volumes:
      - backend_uploads:/app/uploads

  ai-service:
    build: ./ai-service
    container_name: attendance-ai-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
    volumes:
      - ai_data:/app/known_faces
      - ai_data:/app/exports
      - ai_data:/app/backups

  frontend:
    build: ./frontend
    container_name: attendance-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_WS_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads:
  ai_data: